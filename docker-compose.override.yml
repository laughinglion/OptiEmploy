services:
  seq:
    image: datalust/seq:latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"

  postgres:
    ports:
      - "5432:5432"

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=employment_verify;Username=postgres;Password=${POSTGRES_PASSWORD:-changeme}"
      Jwt__SecretKey: ${JWT_SECRET_KEY:-dev-secret-key-at-least-32-chars-long-for-testing}
      Jwt__Issuer: EmploymentVerify
      Jwt__Audience: EmploymentVerify
      Jwt__ExpirationMinutes: 60
      Smtp__Host: ${SMTP_HOST:-localhost}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-dev@localhost}
      Smtp__FromName: Employment Verify Dev
      Smtp__EnableSsl: false
      Pricing__VerificationCostCredits: ${VERIFICATION_COST:-1.00}
      Encryption__FieldKey: ${ENCRYPTION_FIELD_KEY:-dev-encryption-key-not-for-production}
      Serilog__WriteTo__0__Name: Seq
      Serilog__WriteTo__0__Args__serverUrl: http://seq:80
      AdminSeed__Email: ${ADMIN_SEED_EMAIL:-admin@dev.local}
      AdminSeed__Password: ${ADMIN_SEED_PASSWORD:-Admin@12345}
      AdminSeed__FullName: Dev Administrator
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy

  web:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ApiBaseUrl: http://api:8080
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Authentication__Microsoft__ClientId: ${MICROSOFT_CLIENT_ID:-}
      Authentication__Microsoft__ClientSecret: ${MICROSOFT_CLIENT_SECRET:-}
      Authentication__Microsoft__TenantId: ${MICROSOFT_TENANT_ID:-common}
    depends_on:
      - api
